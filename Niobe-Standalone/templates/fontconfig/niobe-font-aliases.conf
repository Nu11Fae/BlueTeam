<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="pattern">
    <test name="family" qual="any">
      <string>Aptos Narrow</string>
    </test>
    <edit name="family" mode="assign_replace">
      <string>Aptos</string>
      <string>Liberation Sans</string>
      <string>DejaVu Sans</string>
    </edit>
    <edit name="style" mode="assign_replace">
      <string>Bold</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>Avenir Next LT Pro</string>
    </test>
    <edit name="family" mode="assign_replace">
      <string>Avenir Next</string>
      <string>Avenir</string>
      <string>Liberation Sans</string>
      <string>DejaVu Sans</string>
    </edit>
    <edit name="style" mode="assign_replace">
      <string>Bold</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>Aptos</string>
    </test>
    <edit name="family" mode="assign_replace">
      <string>Aptos</string>
      <string>Liberation Sans</string>
      <string>DejaVu Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>Courier New</string>
    </test>
    <edit name="family" mode="assign_replace">
      <string>Courier New</string>
      <string>Aptos Mono</string>
      <string>Liberation Mono</string>
      <string>DejaVu Sans Mono</string>
    </edit>
  </match>
</fontconfig>
