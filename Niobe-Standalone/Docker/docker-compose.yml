services:
  db:
    image: postgres:16
    container_name: niobe-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ops/ansible/templates/postgres-init.sql:/docker-entrypoint-initdb.d/10-pgcrypto.sql:ro
    networks:
      - niobe

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: niobe-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NIOBE_AUTH_SECRET: ${NIOBE_AUTH_SECRET}
      NIOBE_API_HOST: ${NIOBE_API_HOST:-0.0.0.0}
      NIOBE_API_PORT: ${NIOBE_API_PORT:-8080}
      NIOBE_HEARTBEAT_TIMEOUT: ${NIOBE_HEARTBEAT_TIMEOUT:-90}
    ports:
      - "${NIOBE_API_BIND_PORT:-8080}:8080"
    volumes:
      - ./storage:/app/storage
    networks:
      - niobe

  sonarqube:
    image: sonarqube:community
    container_name: niobe-sonarqube
    restart: unless-stopped
    profiles: ["analysis"]
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "${SONAR_BIND_PORT:-9000}:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - niobe

  fossology:
    image: fossology/fossology:latest
    container_name: niobe-fossology
    restart: unless-stopped
    profiles: ["analysis"]
    ports:
      - "${FOSSOLOGY_BIND_PORT:-8081}:80"
    networks:
      - niobe

networks:
  niobe:
    driver: bridge

volumes:
  pgdata:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
