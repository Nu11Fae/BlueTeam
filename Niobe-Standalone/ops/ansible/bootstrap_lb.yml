---
- name: Bootstrap Digital Audit load balancer
  hosts: load_balancer
  become: true
  vars:
    ssh_hardened_port: 2222
    control_plane_host: 10.0.0.20
    control_plane_port: 80
    lb_tls_cert_path: ""
    ssh_service_name: "{{ 'sshd' if ansible_os_family == 'RedHat' else 'ssh' }}"
  tasks:
    - name: Install base packages
      package:
        name:
          - curl
          - figlet
          - fail2ban
          - haproxy
        state: present

    - name: Install micro on Debian
      package:
        name: micro
        state: present
      when: ansible_os_family == "Debian"

    - name: Write SSH hardening fragment
      template:
        src: sshd-hardening.conf.j2
        dest: /etc/ssh/sshd_config.d/99-niobe.conf
        mode: "0644"

    - name: Write HAProxy config
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        mode: "0644"

    - name: Enable services
      service:
        name: "{{ item }}"
        state: restarted
        enabled: true
      loop:
        - "{{ ssh_service_name }}"
        - fail2ban
        - haproxy
      ignore_errors: true

    - name: Configure UFW on Debian
      when: ansible_os_family == "Debian"
      block:
        - community.general.ufw:
            rule: allow
            port: "{{ ssh_hardened_port }}"
            proto: tcp
        - community.general.ufw:
            rule: allow
            port: "80"
            proto: tcp
        - community.general.ufw:
            rule: allow
            port: "443"
            proto: tcp
        - community.general.ufw:
            state: enabled

    - name: Configure firewalld on RedHat
      when: ansible_os_family == "RedHat"
      block:
        - ansible.posix.firewalld:
            port: "{{ ssh_hardened_port }}/tcp"
            permanent: true
            state: enabled
            immediate: true
        - ansible.posix.firewalld:
            port: "80/tcp"
            permanent: true
            state: enabled
            immediate: true
        - ansible.posix.firewalld:
            port: "443/tcp"
            permanent: true
            state: enabled
            immediate: true
